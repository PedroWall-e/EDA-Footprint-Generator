# --- Metadados KiCad ---
kicad:
  referencia: "U?"
  valor: "QFN16_4x4"
  descricao: "QFN-16 4x4mm, CI SMD quad flat no-lead, JEDEC MO-220"
  tags: "qfn qfn16 4x4 smd ci quad no-lead exposed-pad"
  modelo_3d: "QFN16_4x4.step"

# --- Tolerancias e margens ---
margens:
  courtyard: 0.25             # IPC-7351: 0.25mm para SMD
  silkscreen: 0.12            # espessura da linha de silkscreen
  fab_line: 0.10              # espessura da linha de fabricacao
