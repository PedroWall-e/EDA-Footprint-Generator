# =============================================================================
# _preset_SMD_0402.yaml — Preset para Chip Resistor/Capacitor 0402 (1005 Metric)
#
# Pacote: 0402 Imperial / 1005 Metric
# Padrao: dual_smd (motor universal — 2 pads SMD simetricos)
# Dimensoes baseadas em IPC-7351B (densidade nominal "N")
# Aplicacao: resistores, capacitores, indutores chip 0402
# Unidades: milimetros (mm)
# =============================================================================

nome: "SMD_0402"
padrao: "dual_smd"
simbolo: "resistor"         # símbolo esquemático: resistor passivo genérico
tipo_3d: "smd_chip"

# --- Corpo do componente ---
corpo:
  largura: 1.0               # 1.0mm (dimensao ao longo do eixo dos pads)
  comprimento: 0.5            # 0.5mm (dimensao perpendicular)
  formato: "retangulo"

# --- Pinos / Pads ---
pinos:
  total: 2
  distribuicao: [1, 1]        # 1 pad de cada lado
  tamanho_pad:
    largura: 0.6              # extensao do pad no eixo X (mm)
    altura: 0.5               # extensao do pad no eixo Y (mm)
  afastamento_colunas: 1.0    # distancia centro-a-centro entre pads (mm)

# --- Metadados KiCad ---
kicad:
  referencia: "R?"
  valor: "0402"
  descricao: "Chip Resistor/Capacitor 0402 (1005 Metric), SMD"
  tags: "smd 0402 1005 chip resistor capacitor"
  modelo_3d: "SMD_0402.step"

# --- Tolerancias e margens (IPC-7351B) ---
margens:
  courtyard: 0.25             # IPC-7351B minimo para componentes pequenos
  silkscreen: 0.12            # espessura da linha de silkscreen
  fab_line: 0.10              # espessura da linha de fabricacao

# --- Nomes e tipos dos pinos ---
pin_names:
  1: "1"
  2: "2"

pin_types:
  1: "passive"
  2: "passive"
