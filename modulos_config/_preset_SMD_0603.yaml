# =============================================================================
# _preset_SMD_0603.yaml — Preset para Chip Resistor/Capacitor 0603 (1608 Metric)
#
# Pacote: 0603 Imperial / 1608 Metric
# Padrao: dual_smd (motor universal — 2 pads SMD simetricos)
# Dimensoes baseadas em IPC-7351B (densidade nominal "N")
# Aplicacao: resistores, capacitores, indutores chip 0603
# Unidades: milimetros (mm)
# =============================================================================

nome: "SMD_0603"
padrao: "dual_smd"
simbolo: "resistor"         # símbolo esquemático: resistor passivo genérico
tipo_3d: "smd_chip"

# --- Corpo do componente ---
corpo:
  largura: 1.6               # 1.6mm (dimensao ao longo do eixo dos pads)
  comprimento: 0.8            # 0.8mm (dimensao perpendicular)
  formato: "retangulo"

# --- Pinos / Pads ---
pinos:
  total: 2
  distribuicao: [1, 1]        # 1 pad de cada lado
  tamanho_pad:
    largura: 0.8              # extensao do pad no eixo X (mm)
    altura: 0.75              # extensao do pad no eixo Y (mm)
  afastamento_colunas: 1.6    # distancia centro-a-centro entre pads (mm)

# --- Metadados KiCad ---
kicad:
  referencia: "R?"
  valor: "0603"
  descricao: "Chip Resistor/Capacitor 0603 (1608 Metric), SMD"
  tags: "smd 0603 1608 chip resistor capacitor"
  modelo_3d: "SMD_0603.step"

# --- Tolerancias e margens (IPC-7351B) ---
margens:
  courtyard: 0.25
  silkscreen: 0.12
  fab_line: 0.10

# --- Nomes e tipos dos pinos ---
pin_names:
  1: "1"
  2: "2"

pin_types:
  1: "passive"
  2: "passive"
