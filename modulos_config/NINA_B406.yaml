# =============================================================================
# u-blox NINA-B406-00B — LGA-71 (15,00 x 10,00 x 2,23 mm)
# Bluetooth LE com antena de trilha integrada no modulo.
#
# Datasheet: UBX-19049405 R09 — Table 22 (Land pattern dimensions).
# TODAS as 71 posicoes sao DERIVADAS das cotas A..ZL — nenhuma medida em
# figura, nenhuma copiada do footprint do fabricante. A derivacao foi
# conferida pad a pad contra o footprint oficial da u-blox: 71/71 iguais.
#
# Origem do footprint: CENTRO do modulo (como o oficial). O datasheet cota a
# partir do PINO 1, entao a conversao aplicada foi:
#     x = -A/2 + D + dx = -5,700 + dx
#     y = +B/2 - E - dy = +4,125 - dy
#
# NOTA: os 71 pads estao explicitos porque o `padrao: custom` exige posicao
# absoluta por pad. A peca e, na verdade, 14 corridas lineares regulares
# (inicio + k*passo). Ver missoes/nina-b406/ACHADOS.md.
# =============================================================================

nome: "NINA_B406"
padrao: custom

corpo:
  largura: 15.0          # Table 22 A — module PCB length
  comprimento: 10.0      # Table 22 B — module PCB width
  formato: retangulo

margens:
  courtyard: 0.25
  silkscreen: 0.12
  fab_line: 0.10

kicad:
  referencia: "U?"
  valor: "NINA-B406"
  descricao: "u-blox NINA-B406 Bluetooth LE module, LGA-71, 15x10x2.23mm, integrated antenna"
  tags: "u-blox nina b406 bluetooth ble lga71 module antenna"

