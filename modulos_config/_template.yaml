# =============================================================================
# _template.yaml — Referência completa de todos os tipos de componente
#
# TIPOS DISPONÍVEIS:
#   castellated    — módulo SMD com furos castelados (ex: RM200, ESP32 module)
#   diodo_pth      — diodo axial PTH (DO-35, DO-41, DO-204AL)
#   resistor_pth   — resistor axial PTH (corpo cilíndrico sem banda)
#   ci_dip         — CI dual in-line THT (DIP-8, DIP-14, DIP-16, DIP-28...)
#   ci_soic        — CI SOIC SMD (SOIC-8, SOIC-14, SOIC-16...)
#   conector_pth   — conector/header 1 fileira PTH (2.54mm ou outro pitch)
#   led_pth        — LED PTH 3mm, 5mm, 8mm
#   capacitor_pth  — capacitor eletrolítico radial PTH
#   transistor_to92 — transistor BJT/FET TO-92 (3 pinos)
#   crystal_hc49   — cristal/ressonador HC-49
#
# REGRAS:
#   - nome: sem espaços (use _ ou CamelCase)
#   - diametro_furo < diametro_pad (furo deve caber dentro do pad)
#   - ci_dip: total de pinos deve ser PAR
#   - modelo_3d_python: opcional — substitui o template 3D built-in
# =============================================================================

nome: "NomeDoComponente"     # Obrigatorio — sem espacos
tipo: "diodo_pth"            # Obrigatorio — escolha um dos tipos listados acima
# padrao: "SOIC-8"           # Alternativa ao 'tipo:' — nome do package padrao
#                             # Use 'tipo' para templates built-in OU 'padrao' para
#                             # referenciar um package padrao por nome (ex: QFP-48, BGA-256)
# simbolo: "diodo"           # OPCIONAL — template do símbolo esquemático (.kicad_sym)
#                             # Valores: resistor, capacitor, diodo, diodo_zener,
#                             # diodo_schottky, led, transistor, mosfet_n, mosfet_p,
#                             # regulador, opamp, indutor, fusivel, bateria, antena,
#                             # crystal, conector, ci, bga
#                             # Se omitido, auto-detecta pelo tipo/padrao e nº de pinos

# =============================================================================
# Identificacao do componente (OPCIONAL)
# =============================================================================
# fabricante: "Texas Instruments"   # Nome do fabricante
# mpn: "NE555P"                    # Manufacturer Part Number
# datasheet_url: "https://www.ti.com/lit/ds/symlink/ne555.pdf"

# =============================================================================
# CAMPOS POR TIPO — Remova os blocos que não se aplicam ao seu tipo
# =============================================================================

# --- Para tipo: castellated ---
# pcb:
#   largura: 22.0
#   altura: 18.0
#   espessura: 1.0
#   material: "FR4"
# shield_metalico:
#   largura: 20.0
#   altura: 16.0
#   espessura: 2.0
#   material: "Aluminum"
# pinos:
#   total: 32
#   por_lado: 16
#   pitch: 1.27
#   lados: 2                   # numero de lados com pinos (2=esq+dir, 4=QFP)
#   tamanho_pad:
#     largura: 2.0
#     altura: 0.8
#   numeracao:
#     inicio_esquerdo: 1
#     inicio_direito: 17
#   overrides:                  # posicoes/tamanhos especiais por pino (castellated)
#     6:
#       posicao: {y: -10.16}
#       pad: {largura: 2.5, altura: 1.2}
#     25:
#       pad: {largura: 2.5, altura: 1.2}

# --- Para tipo: diodo_pth ou resistor_pth ---
corpo:
  comprimento: 5.0     # mm — comprimento do cilindro
  diametro: 2.0        # mm — diametro do cilindro
pinos:
  espacamento: 10.0    # mm — distancia entre centros dos pads
  diametro_pad: 1.8    # mm — diametro externo do anel de cobre
  diametro_furo: 0.8   # mm — diametro do furo (DEVE ser < diametro_pad)

# --- Para tipo: ci_dip ---
# pinos:
#   total: 8            # total de pinos — DEVE ser par
#   pitch: 2.54
#   diametro_pad: 1.7
#   diametro_furo: 0.9
# corpo:
#   largura: 6.35
#   comprimento: 9.52
#   afastamento_colunas: 7.62  # distancia entre colunas de pinos (300mil=7.62, 600mil=15.24)

# --- Para tipo: ci_soic ---
# pinos:
#   total: 8
#   pitch: 1.27
#   tamanho_pad:
#     largura: 1.5
#     altura: 0.6
# corpo:
#   largura: 3.9
#   comprimento: 4.9
#   afastamento_colunas: 5.4

# --- Para tipo: conector_pth ---
# pinos:
#   total: 3
#   pitch: 2.54
#   diametro_pad: 1.7
#   diametro_furo: 1.0

# --- Para tipo: led_pth ---
# corpo:
#   diametro: 5.0        # mm — diametro da lente
#   altura: 8.5          # mm — altura total
# pinos:
#   espacamento: 2.54
#   diametro_pad: 1.8
#   diametro_furo: 0.8

# --- Para tipo: capacitor_pth ---
# corpo:
#   diametro: 8.0        # mm — diametro do cilindro
#   altura: 11.5         # mm — altura total
# pinos:
#   espacamento: 3.5     # mm — distancia entre os dois pads
#   diametro_pad: 2.0
#   diametro_furo: 0.8

# --- Para tipo: transistor_to92 ---
# pinos:
#   total: 3
#   pitch: 1.27
#   diametro_pad: 1.7
#   diametro_furo: 0.9
#   pinagem: "CBE"       # ordem: C=Coletor, B=Base, E=Emissor
# corpo:
#   diametro: 5.0
#   altura: 4.5

# --- Para tipo: crystal_hc49 ---
# corpo:
#   largura: 4.7
#   comprimento: 11.0
#   altura: 3.5
# pinos:
#   espacamento: 4.88
#   diametro_pad: 1.8
#   diametro_furo: 0.9

# --- Para packages assimetricos (ex: SOT-23, SOT-223) ---
# pinos:
#   total: 3
#   distribuicao: [1, 2]       # pinos por lado — SOT-23: 1 pino em cima, 2 embaixo
#                               # SOT-223: [1, 3] — 1 tab em cima, 3 pinos embaixo
#   pitch: 0.95
#   tamanho_pad:
#     largura: 1.0
#     altura: 0.6

# =============================================================================
# Metadados KiCad (obrigatorio para todos os tipos)
# =============================================================================
kicad:
  referencia: "U?"                      # ex: R? D? U? Q? C? Y? J?
  valor: "NomeDoComponente"
  descricao: "Descricao do componente"  # aparece no KiCad
  tags: "palavras chave para busca"
  modelo_3d: "NomeDoComponente.step"   # gerado automaticamente em saida/

# =============================================================================
# Tolerancias e margens (mm) — padrao recomendado
# =============================================================================
margens:
  courtyard: 0.50    # IPC-7351: 0.25mm minimo, 0.50mm recomendado
  silkscreen: 0.12   # espessura da linha de silkscreen
  fab_line: 0.10     # espessura da linha de fab

# =============================================================================
# Solder Mask e Solder Paste (mm) — OPCIONAL
# =============================================================================
# solder_mask_expansion: 0.05   # expansao da mascara de solda alem do pad (mm)
# solder_paste_margin: -0.05    # margem da pasta de solda (negativo = menor que pad)

# =============================================================================
# Pad Termico (OPCIONAL) — para CIs com exposed pad (QFN, DFN, etc.)
# =============================================================================
# thermal_pad:
#   largura: 3.0               # largura do pad termico central (mm)
#   altura: 3.0                # altura do pad termico central (mm)
#   pasta_ratio: 0.5           # % de cobertura de pasta (0.0–1.0), tipico 0.5

# =============================================================================
# Especificacoes Eletricas (OPCIONAL)
# =============================================================================
# eletrico:
#   tolerancia: "5%"           # tolerancia do componente (ex: "1%", "5%", "10%")
#   potencia: "0.25W"          # dissipacao maxima (ex: "0.25W", "1W", "0.5W")
#   tensao_maxima: "50V"       # tensao maxima suportada (ex: "16V", "50V", "1000V")
#   polaridade: true            # true = polarizado, false = nao-polarizado

# =============================================================================
# Modelo 3D Python personalizado (OPCIONAL)
# Se presente, substitui o template 3D built-in.
# Variaveis disponíveis: cq, show_object, dados, nome, os, math
# =============================================================================
# modelo_3d_python: |
#   # Exemplo minimo:
#   pcb = cq.Workplane("XY").box(10, 10, 1.6, centered=(True, True, False))
#   show_object(pcb, name=f"PCB - {nome}", options={"color": (34,139,34)})

# ========================================================================
# CAMPOS OPCIONAIS (novos)
# ========================================================================

# ── Nomes dos pinos (mapeamento numero -> nome funcional) ──
# Exemplo completo: NE555 Timer (DIP-8 / SOIC-8)
# pin_names:
#   1: "GND"        # Terra
#   2: "TRIG"       # Trigger — dispara o timer quando < 1/3 Vcc
#   3: "OUT"        # Saida do timer
#   4: "RESET"      # Reset ativo-baixo
#   5: "CTRL"       # Control Voltage — acesso ao divisor interno
#   6: "THRES"      # Threshold — reseta o timer quando > 2/3 Vcc
#   7: "DISCH"      # Discharge — drena o capacitor de timing
#   8: "VCC"        # Alimentacao positiva (4.5V a 16V)

# ── Tipos elétricos dos pinos ──
# Valores validos:
#   input          — entrada digital/analogica
#   output         — saida push-pull
#   bidirectional  — bidirecional (ex: SDA do I2C)
#   power_in       — alimentacao (VCC, GND)
#   power_out      — saida de alimentacao (regulador)
#   passive        — passivo (resistor, capacitor, cristal)
#   open_collector — saida open-collector/open-drain
#   tri_state      — saida tri-state
#   unspecified    — tipo nao especificado
#
# Exemplo completo: NE555 Timer
# pin_types:
#   1: "power_in"         # GND
#   2: "input"            # TRIG
#   3: "output"           # OUT
#   4: "input"            # RESET
#   5: "input"            # CTRL
#   6: "input"            # THRES
#   7: "open_collector"   # DISCH
#   8: "power_in"         # VCC

# ── Overrides por pino (posição e tamanho absolutos) ──
# pinos_absolutos:
#   6:
#     posicao: {y: -10.16}              # posição absoluta em mm
#     pad: {largura: 2.5, altura: 1.2}  # tamanho diferente do padrão
#   25:
#     pad: {largura: 2.5, altura: 1.2}  # só tamanho, posição normal

# ── Código CadQuery customizado (substitui o template 3D) ──
# modelo_3d_python: |
#   corpo = cq.Workplane("XY").box(10, 20, 3)
#   show_object(corpo, name="Corpo", options={"color": (50, 50, 50)})
