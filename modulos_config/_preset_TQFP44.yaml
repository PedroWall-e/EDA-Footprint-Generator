# =============================================================================
# _preset_TQFP44.yaml — Preset: TQFP-44 10x10 mm
#
# Encapsulamento TQFP (Thin Quad Flat Package) para CIs de medio porte como
# microcontroladores (ATmega328P-AU, ATmega32A), FPGAs pequenas e ASICs.
#
# Dimensoes baseadas no datasheet JEDEC MS-026 / TQFP-44:
#   - Corpo: 10.0 x 10.0 mm
#   - Pad: 1.2 x 0.4 mm (largura perpendicular a borda x altura paralela)
#   - Pitch: 0.8 mm
#   - Afastamento: 12.0 mm (centro-centro entre lados opostos)
#   - 44 pinos: 11 por lado
#
# Numeracao horaria a partir do canto superior-esquerdo:
#   Esquerdo: pinos 1-11  (cima para baixo)
#   Base:     pinos 12-22 (esquerda para direita)
#   Direito:  pinos 23-33 (baixo para cima)
#   Topo:     pinos 34-44 (direita para esquerda)
#
# Usa o motor universal (padrao: quad_smd).
# =============================================================================

nome: "TQFP44"
padrao: "quad_smd"
tipo_3d: "tqfp"

# --- Corpo ---
corpo:
  largura: 10.0              # mm — dimensao X do corpo
  altura: 10.0               # mm — dimensao Y do corpo

# --- Pinos ---
pinos:
  total: 44
  pitch: 0.8                  # mm — espacamento entre pinos adjacentes
  tamanho_pad:
    largura: 1.2              # mm — extensao perpendicular a borda
    altura: 0.4               # mm — extensao paralela a borda
  lados:
    esquerdo: 11              # pinos 1-11
    base: 11                  # pinos 12-22
    direito: 11               # pinos 23-33
    topo: 11                  # pinos 34-44
  afastamento: 12.0           # mm — centro-centro entre lados opostos

