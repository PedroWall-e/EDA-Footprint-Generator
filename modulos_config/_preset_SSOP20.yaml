# =============================================================================
# _preset_SSOP20.yaml — Preset: SSOP-20 (20 pinos)
#
# Encapsulamento SSOP (Shrink Small Outline Package) para CIs SMD como
# shift registers, multiplexadores, drivers de LED, ADCs e DACs.
#
# Dimensoes baseadas no datasheet JEDEC MO-150 / SSOP-20:
#   - Corpo: 7.2 x 5.3 mm
#   - Pad: 1.5 x 0.35 mm (largura perpendicular a borda x altura paralela)
#   - Pitch: 0.65 mm
#   - Afastamento entre colunas (centro-centro): 8.0 mm
#   - 20 pinos: 10 por lado
#
# Numeracao padrao dual:
#   Esquerdo: pinos 1-10  (cima para baixo)
#   Direito:  pinos 11-20 (baixo para cima)
#
# Usa o motor universal (padrao: dual_smd).
# =============================================================================

nome: "SSOP20"
padrao: "dual_smd"
tipo_3d: "ssop"

# --- Corpo ---
corpo:
  largura: 7.2               # mm — dimensao X do corpo
  comprimento: 5.3            # mm — dimensao Y do corpo
  afastamento_colunas: 8.0    # mm — centro-centro entre colunas de pads

# --- Pinos ---
pinos:
  total: 20
  pitch: 0.65                 # mm — espacamento entre pinos no mesmo lado
  tamanho_pad:
    largura: 1.5              # mm — extensao perpendicular a borda
    altura: 0.35              # mm — extensao paralela a borda

